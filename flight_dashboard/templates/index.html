<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dave's ADS-B Radar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');

        :root {
            --primary: #00ff88;
            --secondary: #00ccff;
            --warning: #ffaa00;
            --danger: #ff4444;
            --bg-dark: #0a0a0f;
            --bg-panel: #0d1117;
            --bg-card: #161b22;
            --border: #30363d;
            --text-dim: #6e7681;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Share Tech Mono', monospace;
            background: var(--bg-dark);
            color: #e6edf3;
            min-height: 100vh;
            overflow-x: hidden;
            /* Feature 2: auto-dim smooth 60-second transition */
            transition: filter 60s linear;
            filter: brightness(1);
        }

        /* Scanline effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1),
                rgba(0, 0, 0, 0.1) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 1000;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            text-shadow: 0 0 20px var(--primary);
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid var(--primary);
            border-radius: 4px;
            font-size: 0.75rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 5px var(--primary); }
            50% { opacity: 0.5; box-shadow: 0 0 15px var(--primary); }
        }

        .header-right {
            display: flex;
            gap: 20px;
            font-size: 0.85rem;
        }

        .header-stat {
            text-align: center;
        }

        .header-stat .value {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--secondary);
        }

        .header-stat .label {
            color: var(--text-dim);
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        /* Featured Aircraft Panel */
        .featured-panel {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
        }

        .panel-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .featured-content {
            padding: 25px;
        }

        .featured-callsign {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            color: var(--primary);
            text-shadow: 0 0 30px rgba(0, 255, 136, 0.5);
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .featured-airline {
            font-size: 1.1rem;
            color: var(--secondary);
            margin-bottom: 20px;
        }

        .featured-aircraft-type {
            display: inline-block;
            padding: 6px 14px;
            background: rgba(0, 204, 255, 0.15);
            border: 1px solid var(--secondary);
            border-radius: 4px;
            color: var(--secondary);
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        .data-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .data-cell {
            background: var(--bg-card);
            padding: 15px;
            border-radius: 4px;
            border-left: 3px solid var(--border);
        }

        .data-cell.highlight {
            border-left-color: var(--primary);
        }

        .data-cell .value {
            font-size: 1.3rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 4px;
        }

        .data-cell .label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .data-cell.climbing .value { color: var(--primary); }
        .data-cell.descending .value { color: var(--warning); }
        .data-cell.level .value { color: var(--secondary); }

        /* Aircraft Details Section */
        .aircraft-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 3px;
        }

        .detail-item .label {
            color: var(--text-dim);
            font-size: 0.75rem;
        }

        .detail-item .value {
            color: #fff;
            font-size: 0.85rem;
        }

        /* Aircraft List */
        .aircraft-list-panel {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 140px);
        }

        .aircraft-list {
            flex: 1;
            overflow-y: auto;
        }

        .aircraft-item {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.2s;
        }

        .aircraft-item:hover {
            background: var(--bg-card);
        }

        .aircraft-item.selected {
            background: rgba(0, 255, 136, 0.1);
            border-left: 3px solid var(--primary);
        }

        .aircraft-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .aircraft-item-callsign {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary);
        }

        .aircraft-item-type {
            font-size: 0.7rem;
            color: var(--text-dim);
            background: var(--bg-dark);
            padding: 3px 8px;
            border-radius: 3px;
        }

        .aircraft-item-stats {
            display: flex;
            gap: 15px;
            font-size: 0.75rem;
        }

        .aircraft-item-stat {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .aircraft-item-stat .icon {
            color: var(--text-dim);
        }

        .aircraft-item-stat.climbing { color: var(--primary); }
        .aircraft-item-stat.descending { color: var(--warning); }
        .aircraft-item-stat.level { color: var(--secondary); }

        /* No Data State */
        .no-data {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            text-align: center;
        }

        .no-data-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .no-data-text {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .radar-sweep {
            width: 80px;
            height: 80px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            position: relative;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .radar-sweep::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50%;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), transparent);
            transform-origin: left center;
            animation: sweep 2s linear infinite;
        }

        @keyframes sweep {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Error State */
        .error-banner {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid var(--danger);
            border-radius: 4px;
            padding: 20px;
            text-align: center;
            color: var(--danger);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 15px;
            color: var(--text-dim);
            font-size: 0.7rem;
            margin-top: 20px;
        }

        .threshold-control {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .threshold-control label {
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .threshold-control input[type=range] {
            width: 80px;
            accent-color: var(--primary);
        }

        .threshold-value {
            color: var(--primary);
            min-width: 40px;
        }

        .demo-badge {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(255, 170, 0, 0.2);
            border: 1px solid var(--warning);
            border-radius: 3px;
            color: var(--warning);
            font-size: 0.7rem;
            margin-left: 10px;
        }

        /* Radar toggle button */
        #radar-toggle-btn {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            letter-spacing: 1px;
            cursor: pointer;
            padding: 5px 12px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-dim);
            transition: border-color 0.2s, color 0.2s;
            user-select: none;
        }
        #radar-toggle-btn:hover, #radar-toggle-btn.active {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Radar modal overlay */
        #radar-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        #radar-modal.visible {
            display: flex;
        }

        .radar-modal-box {
            background: var(--bg-panel);
            border: 1px solid var(--primary);
            border-radius: 6px;
            box-shadow: 0 0 40px rgba(0,255,136,0.15);
            width: min(90vw, 520px);
            overflow: hidden;
        }

        .radar-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
        }

        .radar-modal-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            color: var(--primary);
            letter-spacing: 1px;
        }

        .radar-close-btn {
            cursor: pointer;
            font-size: 1.1rem;
            color: var(--text-dim);
            padding: 2px 6px;
            border-radius: 3px;
            border: 1px solid transparent;
        }
        .radar-close-btn:hover { border-color: var(--border); color: #fff; }

        .radar-canvas-wrap {
            position: relative;
            width: 100%;
        }

        #radar-canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        /* Bearing in detail panel */
        .bearing-display {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .bearing-deg {
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
        }

        .bearing-card {
            font-size: 0.85rem;
            color: var(--secondary);
        }

        /* Bearing column in list */
        .bearing-tag {
            font-size: 0.7rem;
            color: var(--secondary);
            background: rgba(0, 204, 255, 0.1);
            border: 1px solid rgba(0, 204, 255, 0.3);
            padding: 2px 5px;
            border-radius: 3px;
            white-space: nowrap;
        }

        /* ===== FEATURE 1: Emergency Squawk Banner ===== */
        #emergency-banner {
            display: none;
            width: 100%;
            margin-bottom: 14px;
        }

        .emergency-alert {
            width: 100%;
            padding: 14px 20px;
            border-radius: 4px;
            border: 2px solid;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 8px;
        }

        .emergency-alert:last-child { margin-bottom: 0; }

        /* 7500 hijack — flashing red */
        .emergency-alert.sq-7500 {
            background: rgba(255, 30, 30, 0.18);
            border-color: #ff1e1e;
            color: #ff7070;
            animation: flash-red 1s ease-in-out infinite;
        }

        @keyframes flash-red {
            0%, 100% { background: rgba(255, 30, 30, 0.18); box-shadow: none; }
            50%       { background: rgba(255, 30, 30, 0.42); box-shadow: 0 0 20px #ff1e1e; }
        }

        /* 7700 general emergency — solid red */
        .emergency-alert.sq-7700 {
            background: rgba(255, 68, 68, 0.18);
            border-color: var(--danger);
            color: #ff8888;
        }

        /* 7600 radio failure — orange */
        .emergency-alert.sq-7600 {
            background: rgba(255, 140, 0, 0.15);
            border-color: #ff8c00;
            color: #ffb347;
        }

        .emergency-icon { font-size: 1.6rem; flex-shrink: 0; }

        .emergency-body { flex: 1; }

        .emergency-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .emergency-detail { font-size: 0.8rem; opacity: 0.9; }

        /* ===== FEATURE 2: Day/Night toggle button ===== */
        #daynight-toggle {
            font-size: 1.3rem;
            cursor: pointer;
            user-select: none;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            transition: border-color 0.3s;
            line-height: 1;
        }

        #daynight-toggle:hover { border-color: var(--text-dim); }

        #daynight-toggle.override-active {
            border-color: var(--warning);
            box-shadow: 0 0 8px rgba(255, 170, 0, 0.4);
        }

        /* ===== FEATURE 3: Aircraft class color coding ===== */

        /* Featured panel border tints */
        .featured-panel.class-military {
            border-color: #c9a227;
            box-shadow: 0 0 16px rgba(201, 162, 39, 0.18);
        }
        .featured-panel.class-military .panel-header {
            background: rgba(201, 162, 39, 0.10);
            border-bottom-color: #c9a227;
        }

        .featured-panel.class-heavy {
            border-color: var(--secondary);
            box-shadow: 0 0 16px rgba(0, 204, 255, 0.13);
        }
        .featured-panel.class-heavy .panel-header {
            background: rgba(0, 204, 255, 0.07);
            border-bottom-color: var(--secondary);
        }

        .featured-panel.class-emergency {
            border-color: var(--danger);
            box-shadow: 0 0 16px rgba(255, 68, 68, 0.18);
        }
        .featured-panel.class-emergency .panel-header {
            background: rgba(255, 68, 68, 0.08);
            border-bottom-color: var(--danger);
        }

        /* Featured callsign color by class */
        .featured-callsign.class-military {
            color: #f0c040;
            text-shadow: 0 0 24px rgba(240, 192, 64, 0.45);
        }
        .featured-callsign.class-heavy {
            color: var(--secondary);
            text-shadow: 0 0 24px rgba(0, 204, 255, 0.45);
        }
        .featured-callsign.class-emergency {
            color: var(--danger);
            text-shadow: 0 0 24px rgba(255, 68, 68, 0.45);
        }

        /* Badges in featured panel */
        .class-badge-featured {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.78rem;
            padding: 4px 10px;
            border-radius: 3px;
            letter-spacing: 1px;
        }
        .class-badge-featured.mil {
            background: rgba(201, 162, 39, 0.2);
            border: 1px solid #c9a227;
            color: #f0c040;
        }
        .class-badge-featured.heavy {
            background: rgba(0, 204, 255, 0.13);
            border: 1px solid var(--secondary);
            color: var(--secondary);
        }

        /* Contacts list row color coding */
        .aircraft-item {
            border-left: 3px solid transparent;
        }

        .aircraft-item.class-military {
            border-left-color: #c9a227;
        }
        .aircraft-item.class-military .aircraft-item-callsign {
            color: #f0c040;
        }

        .aircraft-item.class-heavy {
            border-left-color: var(--secondary);
        }
        .aircraft-item.class-heavy .aircraft-item-callsign {
            color: var(--secondary);
        }

        .aircraft-item.class-emergency {
            border-left-color: var(--danger);
        }
        .aircraft-item.class-emergency .aircraft-item-callsign {
            color: var(--danger);
        }

        /* Keep selected highlight readable on top of class tints */
        .aircraft-item.selected.class-military,
        .aircraft-item.selected.class-heavy,
        .aircraft-item.selected.class-emergency {
            background: rgba(0, 255, 136, 0.07);
            border-left-color: var(--primary);
        }

        /* Small badges in contacts list */
        .class-badge {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.62rem;
            padding: 2px 6px;
            border-radius: 3px;
            letter-spacing: 0.5px;
            vertical-align: middle;
            margin-left: 6px;
        }
        .class-badge.mil {
            background: rgba(201, 162, 39, 0.2);
            border: 1px solid #c9a227;
            color: #f0c040;
        }
        .class-badge.heavy {
            background: rgba(0, 204, 255, 0.12);
            border: 1px solid var(--secondary);
            color: var(--secondary);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-dim);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Feature 1: Emergency Squawk Banner -->
        <div id="emergency-banner"></div>

        <header class="header">
            <div class="header-left">
                <div class="logo">ADS-B RADAR</div>
                <div class="status-badge">
                    <div class="status-dot"></div>
                    <span>RECEIVING</span>
                </div>
                <span id="demo-badge"></span>
            </div>
            <div class="header-right" style="align-items:center;">
                <button id="radar-toggle-btn" title="Toggle radar display">⬤ RADAR</button>
                <!-- Feature 2: Day/Night indicator & manual override -->
                <span id="daynight-toggle" title="Click to override day/night mode">&#9728;</span>

                <div class="threshold-control">
                    <label>Max Age</label>
                    <input type="range" id="threshold-slider" min="10" max="300" step="10" value="120">
                    <span class="threshold-value"><span id="threshold-display">60</span>s</span>
                </div>
                <div class="header-stat">
                    <div class="value" id="aircraft-count">-</div>
                    <div class="label">Aircraft</div>
                </div>
                <div class="header-stat">
                    <div class="value" id="update-time">--:--:--</div>
                    <div class="label">Updated</div>
                </div>
            </div>
        </header>

        <!-- Radar modal overlay -->
        <div id="radar-modal">
            <div class="radar-modal-box">
                <div class="radar-modal-header">
                    <span class="radar-modal-title">RADAR DISPLAY — 25 mi</span>
                    <span class="radar-close-btn" id="radar-close-btn" title="Close">✕</span>
                </div>
                <div class="radar-canvas-wrap" id="radar-canvas-wrap">
                    <canvas id="radar-canvas"></canvas>
                </div>
            </div>
        </div>

        <!-- Main layout: full-width featured + list -->
        <div class="featured-panel" id="featured-panel">
            <div class="panel-header">
                <span class="panel-title">Primary Target</span>
                <span id="featured-seen" style="color: var(--text-dim); font-size: 0.75rem;"></span>
            </div>
            <div class="featured-content" id="featured-content">
                <div class="no-data">
                    <div class="radar-sweep"></div>
                    <div class="no-data-text">Scanning for aircraft...</div>
                </div>
            </div>
        </div>

        <div class="aircraft-list-panel" style="margin-top:20px;">
            <div class="panel-header">
                <span class="panel-title">All Contacts</span>
            </div>
            <div class="aircraft-list" id="aircraft-list">
                <div class="no-data">
                    <div class="no-data-text">No contacts</div>
                </div>
            </div>
        </div>

        <div class="footer">
            ADS-B Flight Dashboard | Data from dump1090-fa | Refreshes every 2s
        </div>
    </div>

    <script>
        // ============================================================
        //  FEATURE 1: Emergency Squawk Tracking
        // ============================================================
        const EMERGENCY_SQUAWKS = {
            '7500': { label: 'HIJACK',         meaning: 'Aircraft is being hijacked',          severity: 'sq-7500', icon: '&#x1F6A8;' },
            '7600': { label: 'RADIO FAILURE',  meaning: 'Loss of communications (NORDO)',       severity: 'sq-7600', icon: '&#x1F4E1;' },
            '7700': { label: 'EMERGENCY',      meaning: 'General emergency declared',           severity: 'sq-7700', icon: '&#x1F198;' },
        };

        // keyed by icao_hex → { squawk, callsign, firstSeen }
        let emergencySquawks = {};

        function updateEmergencyTracker(aircraft) {
            const nowMs = Date.now();
            const activeHexes = new Set();

            for (const ac of aircraft) {
                const sq = String(ac.squawk || '');
                if (EMERGENCY_SQUAWKS[sq]) {
                    activeHexes.add(ac.icao_hex);
                    if (!emergencySquawks[ac.icao_hex]) {
                        emergencySquawks[ac.icao_hex] = {
                            squawk: sq,
                            callsign: ac.callsign,
                            firstSeen: nowMs,
                        };
                    } else {
                        // Update callsign in case it changed; preserve firstSeen
                        emergencySquawks[ac.icao_hex].callsign = ac.callsign;
                        emergencySquawks[ac.icao_hex].squawk = sq;
                    }
                }
            }

            // Auto-dismiss: remove any that are no longer active
            for (const hex of Object.keys(emergencySquawks)) {
                if (!activeHexes.has(hex)) {
                    delete emergencySquawks[hex];
                }
            }

            renderEmergencyBanner();
        }

        function formatDuration(ms) {
            const s = Math.floor(ms / 1000);
            if (s < 60) return s + 's';
            const m = Math.floor(s / 60), rs = s % 60;
            if (m < 60) return m + 'm ' + rs + 's';
            const h = Math.floor(m / 60), rm = m % 60;
            return h + 'h ' + rm + 'm';
        }

        function renderEmergencyBanner() {
            const banner = document.getElementById('emergency-banner');
            const entries = Object.values(emergencySquawks);

            if (entries.length === 0) {
                banner.style.display = 'none';
                banner.innerHTML = '';
                return;
            }

            // Severity order: 7500 most urgent first
            const order = { '7500': 0, '7700': 1, '7600': 2 };
            entries.sort((a, b) => (order[a.squawk] ?? 9) - (order[b.squawk] ?? 9));

            banner.style.display = 'block';
            banner.innerHTML = entries.map(entry => {
                const info = EMERGENCY_SQUAWKS[entry.squawk];
                const dur = formatDuration(Date.now() - entry.firstSeen);
                return `<div class="emergency-alert ${info.severity}">
                    <span class="emergency-icon">${info.icon}</span>
                    <div class="emergency-body">
                        <div class="emergency-title">SQUAWK ${entry.squawk} &mdash; ${info.label} | ${entry.callsign}</div>
                        <div class="emergency-detail">${info.meaning} &bull; Active for: <strong>${dur}</strong></div>
                    </div>
                </div>`;
            }).join('');
        }

        // Keep durations updating every second
        setInterval(() => {
            if (Object.keys(emergencySquawks).length > 0) renderEmergencyBanner();
        }, 1000);


        // ============================================================
        //  FEATURE 2: Auto-Dim at Night (NOAA Solar Calculation)
        // ============================================================
        const ANTENNA_LAT = 47.650923;
        const ANTENNA_LON = -122.346385;

        // NOAA solar calculation algorithm
        // Returns { sunrise: Date, sunset: Date } in UTC (use local time comparison)
        function calcSunriseSunset(lat, lon, date) {
            const toRad = d => d * Math.PI / 180;
            const toDeg = r => r * 180 / Math.PI;

            const JD = date.getTime() / 86400000 + 2440587.5;
            const T  = (JD - 2451545.0) / 36525.0;

            const L0 = (280.46646 + T * (36000.76983 + T * 0.0003032)) % 360;
            const M  = 357.52911 + T * (35999.05029 - 0.0001537 * T);
            const C  = Math.sin(toRad(M)) * (1.914602 - T * (0.004817 + 0.000014 * T))
                     + Math.sin(toRad(2 * M)) * (0.019993 - 0.000101 * T)
                     + Math.sin(toRad(3 * M)) * 0.000289;
            const sunLon  = L0 + C;
            const omega   = 125.04 - 1934.136 * T;
            const lambda  = sunLon - 0.00569 - 0.00478 * Math.sin(toRad(omega));
            const eps0    = 23.0 + (26.0 + (21.448 - T * (46.8150 + T * (0.00059 - T * 0.001813))) / 60.0) / 60.0;
            const epsilon = eps0 + 0.00256 * Math.cos(toRad(omega));
            const sinDec  = Math.sin(toRad(epsilon)) * Math.sin(toRad(lambda));
            const dec     = toDeg(Math.asin(sinDec));
            const y       = Math.tan(toRad(epsilon / 2)) ** 2;
            const ecc     = 0.016708634;
            const eot     = 4 * toDeg(
                y * Math.sin(2 * toRad(L0))
                - 2 * ecc * Math.sin(toRad(M))
                + 4 * ecc * y * Math.sin(toRad(M)) * Math.cos(2 * toRad(L0))
                - 0.5 * y * y * Math.sin(4 * toRad(L0))
                - 1.25 * ecc * ecc * Math.sin(2 * toRad(M))
            );

            const cosHA = (Math.cos(toRad(90.833)) - Math.sin(toRad(lat)) * Math.sin(toRad(dec)))
                        / (Math.cos(toRad(lat)) * Math.cos(toRad(dec)));

            // Polar day/night edge cases
            if (cosHA <= -1) return { sunrise: new Date(date.setHours(0,0,0,0)), sunset: new Date(date.setHours(23,59,59,0)) };
            if (cosHA >=  1) return { sunrise: null, sunset: null };

            const HA          = toDeg(Math.acos(cosHA));
            const solarNoonUTC = 720 - 4 * lon - eot;
            const sunriseUTC  = solarNoonUTC - 4 * HA;
            const sunsetUTC   = solarNoonUTC + 4 * HA;

            const sod = new Date(date); sod.setUTCHours(0, 0, 0, 0);
            return {
                sunrise: new Date(sod.getTime() + sunriseUTC * 60000),
                sunset:  new Date(sod.getTime() + sunsetUTC  * 60000),
            };
        }

        let isNightMode   = false;
        let dayNightOverride = false;

        function applyDimMode(night) {
            document.body.style.filter = night ? 'brightness(0.4)' : 'brightness(1)';
            const toggle = document.getElementById('daynight-toggle');
            if (toggle) toggle.textContent = night ? '\u263E' : '\u2600';
        }

        function checkDayNight() {
            const now = new Date();
            const { sunrise, sunset } = calcSunriseSunset(ANTENNA_LAT, ANTENNA_LON, new Date(now));
            let shouldBeNight = false;
            if (sunrise && sunset) {
                shouldBeNight = now < sunrise || now > sunset;
            }

            if (dayNightOverride) {
                // Cancel override when natural switch point is reached
                if (shouldBeNight !== isNightMode) {
                    dayNightOverride = false;
                    document.getElementById('daynight-toggle').classList.remove('override-active');
                    isNightMode = shouldBeNight;
                    applyDimMode(isNightMode);
                }
                // else remain in forced-day state
            } else {
                if (shouldBeNight !== isNightMode) {
                    isNightMode = shouldBeNight;
                    applyDimMode(isNightMode);
                }
            }
        }

        document.getElementById('daynight-toggle').addEventListener('click', () => {
            dayNightOverride = !dayNightOverride;
            const toggle = document.getElementById('daynight-toggle');
            if (dayNightOverride) {
                toggle.classList.add('override-active');
                applyDimMode(false);        // force bright
            } else {
                toggle.classList.remove('override-active');
                checkDayNight();            // re-evaluate immediately
            }
        });

        // Initial check + recalculate every minute
        checkDayNight();
        setInterval(checkDayNight, 60000);


        // ============================================================
        //  FEATURE 3 helper: resolve effective display class
        // ============================================================
        function getAircraftDisplayClass(ac) {
            const sq = String(ac.squawk || '');
            if (EMERGENCY_SQUAWKS[sq]) return 'emergency';
            if (ac.aircraft_class === 'military') return 'military';
            if (ac.aircraft_class === 'heavy')    return 'heavy';
            return 'normal';
        }


        // ============================================================
        //  Core dashboard state
        // ============================================================
        let selectedIndex = 0;
        let aircraftData = [];

        // Antenna location — must match app.py
        const HOME_LAT = 47.650923;
        const HOME_LON = -122.346385;

        // ── Radar Map ─────────────────────────────────────────────────────────
        const RANGE_RINGS_MI = [5, 10, 20];
        const MAX_RANGE_MI = 25;
        // Miles per degree latitude (constant); miles per degree longitude varies
        const MI_PER_DEG_LAT = 69.0;

        function milesPerDegLon(lat) {
            return MI_PER_DEG_LAT * Math.cos(lat * Math.PI / 180);
        }

        function latLonToCanvas(lat, lon, cx, cy, scale) {
            // scale = pixels per mile
            const dy = (lat - HOME_LAT) * MI_PER_DEG_LAT;     // north positive
            const dx = (lon - HOME_LON) * milesPerDegLon(HOME_LAT); // east positive
            return {
                x: cx + dx * scale,
                y: cy - dy * scale   // canvas y inverts north
            };
        }

        function getAircraftColor(ac) {
            if (ac.aircraft_class === 'military') return '#ffd700';   // gold
            if (ac.aircraft_class === 'heavy')    return '#00ccff';   // cyan
            return '#e0e0e0';                                          // light gray
        }

        function drawRadar() {
            const canvas = document.getElementById('radar-canvas');
            if (!canvas) return;

            // Keep canvas square, fill wrapper width
            const wrap = document.getElementById('radar-canvas-wrap');
            const size = wrap.clientWidth;
            canvas.width  = size;
            canvas.height = size;

            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, size, size);

            const cx = size / 2;
            const cy = size / 2;
            // scale: pixels per mile — fit MAX_RANGE_MI into half the canvas with a small margin
            const scale = (size / 2 - 20) / MAX_RANGE_MI;

            // Background
            ctx.fillStyle = '#060d10';
            ctx.fillRect(0, 0, size, size);

            // Subtle grid lines (N/S/E/W cross-hairs)
            ctx.strokeStyle = 'rgba(0,255,136,0.08)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(cx, 0); ctx.lineTo(cx, size);
            ctx.moveTo(0, cy); ctx.lineTo(size, cy);
            ctx.stroke();

            // Range rings
            RANGE_RINGS_MI.forEach(r => {
                const px = r * scale;
                ctx.beginPath();
                ctx.arc(cx, cy, px, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(0,255,136,0.25)';
                ctx.lineWidth = 1;
                ctx.stroke();

                // Label at top of ring
                ctx.fillStyle = 'rgba(0,255,136,0.5)';
                ctx.font = `${Math.max(9, size * 0.022)}px "Share Tech Mono", monospace`;
                ctx.textAlign = 'center';
                ctx.fillText(r + ' mi', cx, cy - px + 12);
            });

            // Compass rose tick marks
            const cardinals = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
            const outerR = MAX_RANGE_MI * scale;
            ctx.fillStyle = 'rgba(0,255,136,0.6)';
            ctx.font = `bold ${Math.max(9, size * 0.025)}px "Share Tech Mono", monospace`;
            cardinals.forEach((label, i) => {
                const angle = (i * 45 - 90) * Math.PI / 180;
                const lx = cx + (outerR + 14) * Math.cos(angle);
                const ly = cy + (outerR + 14) * Math.sin(angle);
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(label, lx, ly);
            });

            // Antenna centre dot
            ctx.beginPath();
            ctx.arc(cx, cy, 4, 0, Math.PI * 2);
            ctx.fillStyle = '#00ff88';
            ctx.fill();

            // Aircraft
            const dotRadius = Math.max(4, size * 0.012);
            const labelFont = `${Math.max(8, size * 0.022)}px "Share Tech Mono", monospace`;

            aircraftData.forEach((ac, i) => {
                if (ac.lat == null || ac.lon == null) return;

                const pos = latLonToCanvas(ac.lat, ac.lon, cx, cy, scale);

                // Skip if outside visible range (with a small buffer)
                const distPx = Math.hypot(pos.x - cx, pos.y - cy);
                if (distPx > outerR + 10) return;

                const color = getAircraftColor(ac);
                const isSelected = (i === selectedIndex);

                ctx.save();
                ctx.translate(pos.x, pos.y);

                // Draw triangle pointing in heading direction (or fallback dot)
                const heading = ac.heading;
                if (heading != null) {
                    const headRad = (heading - 90) * Math.PI / 180;
                    const tipLen = dotRadius * 2.2;
                    const baseW  = dotRadius * 1.4;
                    ctx.rotate(headRad);
                    ctx.beginPath();
                    ctx.moveTo(tipLen, 0);
                    ctx.lineTo(-baseW, -baseW * 0.7);
                    ctx.lineTo(-baseW * 0.5, 0);
                    ctx.lineTo(-baseW, baseW * 0.7);
                    ctx.closePath();
                    ctx.fillStyle = color;
                    ctx.fill();
                    if (isSelected) {
                        ctx.strokeStyle = '#fff';
                        ctx.lineWidth = 1.5;
                        ctx.stroke();
                    }
                } else {
                    ctx.beginPath();
                    ctx.arc(0, 0, dotRadius, 0, Math.PI * 2);
                    ctx.fillStyle = color;
                    ctx.fill();
                    if (isSelected) {
                        ctx.strokeStyle = '#fff';
                        ctx.lineWidth = 1.5;
                        ctx.stroke();
                    }
                }

                ctx.restore();

                // Callsign label — only draw if not too crowded (basic check)
                const callsign = ac.callsign || '';
                if (callsign && size > 200) {
                    ctx.font = labelFont;
                    ctx.textAlign = 'left';
                    ctx.textBaseline = 'middle';
                    ctx.fillStyle = isSelected ? '#fff' : 'rgba(200,210,220,0.75)';
                    ctx.fillText(callsign, pos.x + dotRadius * 2.5, pos.y - dotRadius);
                }
            });
        }

        // Hit-test: find aircraft closest to a canvas click
        function radarHitTest(canvasX, canvasY) {
            const canvas = document.getElementById('radar-canvas');
            const size = canvas.width;
            const cx = size / 2;
            const cy = size / 2;
            const scale = (size / 2 - 20) / MAX_RANGE_MI;

            let bestIdx = -1;
            let bestDist = 18; // pixels — tap target radius

            aircraftData.forEach((ac, i) => {
                if (ac.lat == null || ac.lon == null) return;
                const pos = latLonToCanvas(ac.lat, ac.lon, cx, cy, scale);
                const d = Math.hypot(canvasX - pos.x, canvasY - pos.y);
                if (d < bestDist) {
                    bestDist = d;
                    bestIdx = i;
                }
            });
            return bestIdx;
        }

        function initRadarCanvas() {
            const canvas = document.getElementById('radar-canvas');
            if (!canvas) return;

            // Resize canvas to square when modal is visible
            function resizeCanvas() {
                const wrap = document.getElementById('radar-canvas-wrap');
                wrap.style.height = wrap.clientWidth + 'px';
                drawRadar();
            }
            window.addEventListener('resize', resizeCanvas);

            // Modal toggle
            const modal = document.getElementById('radar-modal');
            const toggleBtn = document.getElementById('radar-toggle-btn');
            const closeBtn = document.getElementById('radar-close-btn');

            function openRadar() {
                modal.classList.add('visible');
                toggleBtn.classList.add('active');
                // Slight delay so the modal has rendered before sizing canvas
                setTimeout(resizeCanvas, 30);
            }
            function closeRadar() {
                modal.classList.remove('visible');
                toggleBtn.classList.remove('active');
            }

            toggleBtn.addEventListener('click', () => {
                modal.classList.contains('visible') ? closeRadar() : openRadar();
            });
            closeBtn.addEventListener('click', closeRadar);
            // Tap outside the box to close
            modal.addEventListener('click', e => {
                if (e.target === modal) closeRadar();
            });

            // Click / tap to select aircraft
            canvas.addEventListener('click', function(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width  / rect.width;
                const scaleY = canvas.height / rect.height;
                const cx = (e.clientX - rect.left)  * scaleX;
                const cy = (e.clientY - rect.top)   * scaleY;
                const idx = radarHitTest(cx, cy);
                if (idx >= 0) {
                    selectAircraft(idx);
                }
            });
        }

        function formatAlt(alt) {
            if (alt === null || alt === undefined) return '---';
            if (alt === 'ground') return 'GND';
            return Number(alt).toLocaleString();

        function formatSpeed(spd) {
            if (spd === null || spd === undefined) return '---';
            return Math.round(spd);
        }

        function formatHeading(hdg) {
            if (hdg === null || hdg === undefined) return '---';
            const dirs = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
            return Math.round(hdg) + '° ' + dirs[Math.round(hdg / 45) % 8];
        }

        function formatVRate(vr) {
            if (vr === null || vr === undefined) return '---';
            const sign = vr > 0 ? '+' : '';
            return sign + Math.round(vr);
        }

        function getVerticalClass(status) {
            if (status === 'CLIMBING') return 'climbing';

        }

        function renderAircraftList(aircraft) {

        function selectAircraft(index) {

        function updateDisplay() {
            const featured = aircraftData[selectedIndex] || aircraftData[0];
            document.getElementById('featured-content').innerHTML = renderFeatured(featured);
            document.getElementById('aircraft-list').innerHTML = renderAircraftList(aircraftData);

            if (featured) {
                document.getElementById('featured-seen').textContent = `Last seen: ${featured.seen}s ago`;

        function updateDashboard(data) {
            if (data.error) {
                document.getElementById('featured-content').innerHTML = `
                    <div class="error-banner">
                        <strong>ERROR:</strong> ${data.error}
                    </div>
                `;
                return;
            }

            aircraftData = data.aircraft || [];

            // Ensure selected index is valid
            if (selectedIndex >= aircraftData.length) {
                selectedIndex = 0;
            }

            document.getElementById('aircraft-count').textContent = aircraftData.length;
            document.getElementById('update-time').textContent = data.updated || '--:--:--';

            if (data.demo_mode) {
                document.getElementById('demo-badge').innerHTML = '<span class="demo-badge">DEMO MODE</span>';
            }

            if (data.dashboard_title) {
                document.title = data.dashboard_title;
                document.querySelector('.logo').textContent = data.dashboard_title;
            }

            // Feature 1: update emergency squawk tracker on every data cycle
            updateEmergencyTracker(aircraftData);

            updateDisplay();

        let fetchFailures = 0;

        function fetchData() {
            fetch('/api/aircraft')
                .then(res => res.json())
                .then(data => {
                    fetchFailures = 0;
                    const indicator = document.getElementById('connection-indicator');
                    if (indicator) indicator.remove();
                    updateDashboard(data);
                })
                .catch(err => {
                    console.error('Fetch error:', err);
                    fetchFailures++;
                    if (fetchFailures >= 3) {
                        updateDashboard({ error: 'Connection failed — retrying…' });
                    } else {
                        // Show subtle indicator without wiping the display
                        let indicator = document.getElementById('connection-indicator');
                        if (!indicator) {
                            indicator = document.createElement('div');
                            indicator.id = 'connection-indicator';
                            indicator.style.cssText = 'position:fixed;top:8px;right:12px;background:#ff4444;color:#fff;padding:4px 10px;border-radius:4px;font-size:11px;opacity:0.85;z-index:999';
                            indicator.textContent = 'Reconnecting…';
                            document.body.appendChild(indicator);
                        }
                    }
                });
        }

        // Threshold slider
        const slider = document.getElementById('threshold-slider');
        const thresholdDisplay = document.getElementById('threshold-display');

        slider.addEventListener('input', () => {
            thresholdDisplay.textContent = slider.value;
        });

        slider.addEventListener('change', () => {
            fetch('/api/settings/seen-threshold', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({value: parseInt(slider.value)})
            });
        });

        // Sync slider with server value on load
        fetch('/api/settings/seen-threshold')
            .then(r => r.json())
            .then(d => {
                slider.value = d.seen_threshold;
                thresholdDisplay.textContent = d.seen_threshold;
            });

        // Initialize radar canvas
        initRadarCanvas();

        // Initial fetch
        fetchData();

        // Refresh every 2 seconds
        setInterval(fetchData, 2000);
    </script>
</body>
</html>
