<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dave's ADS-B Radar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');

        :root {
            --primary: #00ff88;
            --secondary: #00ccff;
            --warning: #ffaa00;
            --danger: #ff4444;
            --bg-dark: #0a0a0f;
            --bg-panel: #0d1117;
            --bg-card: #161b22;
            --border: #30363d;
            --text-dim: #6e7681;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Share Tech Mono', monospace;
            background: var(--bg-dark);
            color: #e6edf3;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Scanline effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1),
                rgba(0, 0, 0, 0.1) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 1000;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            text-shadow: 0 0 20px var(--primary);
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid var(--primary);
            border-radius: 4px;
            font-size: 0.75rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 5px var(--primary); }
            50% { opacity: 0.5; box-shadow: 0 0 15px var(--primary); }
        }

        .header-right {
            display: flex;
            gap: 20px;
            font-size: 0.85rem;
        }

        .header-stat {
            text-align: center;
        }

        .header-stat .value {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--secondary);
        }

        .header-stat .label {
            color: var(--text-dim);
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 20px;
        }

        @media (max-width: 1000px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Featured Aircraft Panel */
        .featured-panel {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
        }

        .panel-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .featured-content {
            padding: 25px;
        }

        .featured-callsign {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            color: var(--primary);
            text-shadow: 0 0 30px rgba(0, 255, 136, 0.5);
            margin-bottom: 5px;
        }

        .featured-airline {
            font-size: 1.1rem;
            color: var(--secondary);
            margin-bottom: 20px;
        }

        .featured-aircraft-type {
            display: inline-block;
            padding: 6px 14px;
            background: rgba(0, 204, 255, 0.15);
            border: 1px solid var(--secondary);
            border-radius: 4px;
            color: var(--secondary);
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        .data-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .data-cell {
            background: var(--bg-card);
            padding: 15px;
            border-radius: 4px;
            border-left: 3px solid var(--border);
        }

        .data-cell.highlight {
            border-left-color: var(--primary);
        }

        .data-cell .value {
            font-size: 1.3rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 4px;
        }

        .data-cell .label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .data-cell.climbing .value { color: var(--primary); }
        .data-cell.descending .value { color: var(--warning); }
        .data-cell.level .value { color: var(--secondary); }

        /* Aircraft Details Section */
        .aircraft-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 3px;
        }

        .detail-item .label {
            color: var(--text-dim);
            font-size: 0.75rem;
        }

        .detail-item .value {
            color: #fff;
            font-size: 0.85rem;
        }

        /* Aircraft List */
        .aircraft-list-panel {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 140px);
        }

        .aircraft-list {
            flex: 1;
            overflow-y: auto;
        }

        .aircraft-item {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.2s;
        }

        .aircraft-item:hover {
            background: var(--bg-card);
        }

        .aircraft-item.selected {
            background: rgba(0, 255, 136, 0.1);
            border-left: 3px solid var(--primary);
        }

        .aircraft-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .aircraft-item-callsign {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary);
        }

        .aircraft-item-type {
            font-size: 0.7rem;
            color: var(--text-dim);
            background: var(--bg-dark);
            padding: 3px 8px;
            border-radius: 3px;
        }

        .aircraft-item-stats {
            display: flex;
            gap: 15px;
            font-size: 0.75rem;
        }

        .aircraft-item-stat {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .aircraft-item-stat .icon {
            color: var(--text-dim);
        }

        .aircraft-item-stat.climbing { color: var(--primary); }
        .aircraft-item-stat.descending { color: var(--warning); }
        .aircraft-item-stat.level { color: var(--secondary); }

        /* No Data State */
        .no-data {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            text-align: center;
        }

        .no-data-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .no-data-text {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .radar-sweep {
            width: 80px;
            height: 80px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            position: relative;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .radar-sweep::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50%;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), transparent);
            transform-origin: left center;
            animation: sweep 2s linear infinite;
        }

        @keyframes sweep {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Error State */
        .error-banner {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid var(--danger);
            border-radius: 4px;
            padding: 20px;
            text-align: center;
            color: var(--danger);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 15px;
            color: var(--text-dim);
            font-size: 0.7rem;
            margin-top: 20px;
        }

        .threshold-control {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .threshold-control label {
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .threshold-control input[type=range] {
            width: 80px;
            accent-color: var(--primary);
        }

        .threshold-value {
            color: var(--primary);
            min-width: 40px;
        }

        .demo-badge {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(255, 170, 0, 0.2);
            border: 1px solid var(--warning);
            border-radius: 3px;
            color: var(--warning);
            font-size: 0.7rem;
            margin-left: 10px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-dim);
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-left">
                <div class="logo">ADS-B RADAR</div>
                <div class="status-badge">
                    <div class="status-dot"></div>
                    <span>RECEIVING</span>
                </div>
                <span id="demo-badge"></span>
            </div>
            <div class="header-right">
                <div class="threshold-control">
                    <label>Max Age</label>
                    <input type="range" id="threshold-slider" min="5" max="300" step="5" value="60">
                    <span class="threshold-value"><span id="threshold-display">60</span>s</span>
                </div>
                <div class="header-stat">
                    <div class="value" id="aircraft-count">-</div>
                    <div class="label">Aircraft</div>
                </div>
                <div class="header-stat">
                    <div class="value" id="update-time">--:--:--</div>
                    <div class="label">Updated</div>
                </div>
            </div>
        </header>

        <div class="main-grid">
            <div class="featured-panel">
                <div class="panel-header">
                    <span class="panel-title">Primary Target</span>
                    <span id="featured-seen" style="color: var(--text-dim); font-size: 0.75rem;"></span>
                </div>
                <div class="featured-content" id="featured-content">
                    <div class="no-data">
                        <div class="radar-sweep"></div>
                        <div class="no-data-text">Scanning for aircraft...</div>
                    </div>
                </div>
            </div>

            <div class="aircraft-list-panel">
                <div class="panel-header">
                    <span class="panel-title">All Contacts</span>
                </div>
                <div class="aircraft-list" id="aircraft-list">
                    <div class="no-data">
                        <div class="no-data-text">No contacts</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">
            ADS-B Flight Dashboard | Data from dump1090-fa | Refreshes every 2s
        </div>
    </div>

    <script>
        let selectedIndex = 0;
        let aircraftData = [];

        function formatAlt(alt) {
            if (alt === null || alt === undefined) return '---';
            if (alt === 'ground') return 'GND';
            return Number(alt).toLocaleString();
        }

        function formatSpeed(spd) {
            if (spd === null || spd === undefined) return '---';
            return Math.round(spd);
        }

        function formatHeading(hdg) {
            if (hdg === null || hdg === undefined) return '---';
            const dirs = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
            return Math.round(hdg) + '° ' + dirs[Math.round(hdg / 45) % 8];
        }

        function formatVRate(vr) {
            if (vr === null || vr === undefined) return '---';
            const sign = vr > 0 ? '+' : '';
            return sign + Math.round(vr);
        }

        function getVerticalClass(status) {
            if (status === 'CLIMBING') return 'climbing';
            if (status === 'DESCENDING') return 'descending';
            return 'level';
        }

        function renderFeatured(ac) {
            if (!ac) {
                return `
                    <div class="no-data">
                        <div class="radar-sweep"></div>
                        <div class="no-data-text">No aircraft detected<br><small>Waiting for ADS-B signals...</small></div>
                    </div>
                `;
            }

            const typeDisplay = ac.aircraft_type || ac.typecode || '---';
            const regDisplay = ac.registration || '---';
            const ageDisplay = ac.age ? `${ac.age} yrs` : '---';
            const categoryDisplay = ac.category || '---';
            const ownerDisplay = ac.owner || '---';
            const vertClass = getVerticalClass(ac.vertical_status);

            return `
                <div class="featured-callsign">${ac.callsign}</div>
                <div class="featured-airline">${ac.airline || 'Unknown Operator'}</div>
                ${typeDisplay !== '---' ? `<div class="featured-aircraft-type">${typeDisplay}</div>` : ''}

                <div class="data-grid">
                    <div class="data-cell highlight">
                        <div class="value">${formatAlt(ac.altitude_baro)}</div>
                        <div class="label">Altitude (ft)</div>
                    </div>
                    <div class="data-cell">
                        <div class="value">${formatSpeed(ac.ground_speed)}</div>
                        <div class="label">Speed (kts)</div>
                    </div>
                    <div class="data-cell">
                        <div class="value">${formatHeading(ac.heading)}</div>
                        <div class="label">Heading</div>
                    </div>
                    <div class="data-cell ${vertClass}">
                        <div class="value">${ac.vertical_icon} ${formatVRate(ac.vertical_rate)}</div>
                        <div class="label">Vert Rate (fpm)</div>
                    </div>
                    <div class="data-cell">
                        <div class="value">${ac.squawk || '---'}</div>
                        <div class="label">Squawk</div>
                    </div>
                    <div class="data-cell">
                        <div class="value">${formatAlt(ac.altitude_gps)}</div>
                        <div class="label">GPS Alt (ft)</div>
                    </div>
                </div>

                <div class="aircraft-details">
                    <div class="detail-item">
                        <span class="label">Registration</span>
                        <span class="value">${regDisplay}</span>
                    </div>
                    <div class="detail-item">
                        <span class="label">ICAO Hex</span>
                        <span class="value">${ac.icao_hex || '---'}</span>
                    </div>
                    <div class="detail-item">
                        <span class="label">Type Code</span>
                        <span class="value">${ac.typecode || '---'}</span>
                    </div>
                    <div class="detail-item">
                        <span class="label">Aircraft Age</span>
                        <span class="value">${ageDisplay}</span>
                    </div>
                    <div class="detail-item">
                        <span class="label">Category</span>
                        <span class="value">${categoryDisplay}</span>
                    </div>
                    <div class="detail-item">
                        <span class="label">Owner</span>
                        <span class="value">${ownerDisplay.substring(0, 20)}${ownerDisplay.length > 20 ? '...' : ''}</span>
                    </div>
                    <div class="detail-item">
                        <span class="label">Distance</span>
                        <span class="value">${ac.distance_mi != null ? ac.distance_mi + ' mi' : '---'}</span>
                    </div>
                    <div class="detail-item">
                        <span class="label">Latitude</span>
                        <span class="value">${ac.lat != null ? ac.lat.toFixed(4) + '°' : '---'}</span>
                    </div>
                    <div class="detail-item">
                        <span class="label">Longitude</span>
                        <span class="value">${ac.lon != null ? ac.lon.toFixed(4) + '°' : '---'}</span>
                    </div>
                    <div class="detail-item">
                        <span class="label">Signal (dBFS)</span>
                        <span class="value">${ac.rssi ? ac.rssi.toFixed(1) : '---'}</span>
                    </div>
                    <div class="detail-item">
                        <span class="label">Messages</span>
                        <span class="value">${ac.messages ? ac.messages.toLocaleString() : '---'}</span>
                    </div>
                </div>
            `;
        }

        function renderAircraftList(aircraft) {
            if (!aircraft || aircraft.length === 0) {
                return '<div class="no-data"><div class="no-data-text">No contacts</div></div>';
            }

            return aircraft.map((ac, i) => {
                const vertClass = getVerticalClass(ac.vertical_status);
                const isSelected = i === selectedIndex;
                const typeDisplay = ac.typecode || '';

                return `
                    <div class="aircraft-item ${isSelected ? 'selected' : ''}" onclick="selectAircraft(${i})">
                        <div class="aircraft-item-header">
                            <span class="aircraft-item-callsign">${ac.callsign}</span>
                            ${typeDisplay ? `<span class="aircraft-item-type">${typeDisplay}</span>` : ''}
                        </div>
                        <div class="aircraft-item-stats">
                            <div class="aircraft-item-stat">
                                <span class="icon">◎</span>
                                <span>${ac.distance_mi != null ? ac.distance_mi + ' mi' : '---'}</span>
                            </div>
                            <div class="aircraft-item-stat">
                                <span class="icon">↕</span>
                                <span>${formatAlt(ac.altitude_baro)} ft</span>
                            </div>
                            <div class="aircraft-item-stat">
                                <span class="icon">→</span>
                                <span>${formatSpeed(ac.ground_speed)} kts</span>
                            </div>
                            <div class="aircraft-item-stat ${vertClass}">
                                <span>${ac.vertical_icon} ${ac.vertical_status}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function selectAircraft(index) {
            selectedIndex = index;
            updateDisplay();
        }

        function updateDisplay() {
            const featured = aircraftData[selectedIndex] || aircraftData[0];
            document.getElementById('featured-content').innerHTML = renderFeatured(featured);
            document.getElementById('aircraft-list').innerHTML = renderAircraftList(aircraftData);

            if (featured) {
                document.getElementById('featured-seen').textContent = `Last seen: ${featured.seen}s ago`;
            }
        }

        function updateDashboard(data) {
            if (data.error) {
                document.getElementById('featured-content').innerHTML = `
                    <div class="error-banner">
                        <strong>ERROR:</strong> ${data.error}
                    </div>
                `;
                return;
            }

            aircraftData = data.aircraft || [];

            // Ensure selected index is valid
            if (selectedIndex >= aircraftData.length) {
                selectedIndex = 0;
            }

            document.getElementById('aircraft-count').textContent = aircraftData.length;
            document.getElementById('update-time').textContent = data.updated || '--:--:--';

            if (data.demo_mode) {
                document.getElementById('demo-badge').innerHTML = '<span class="demo-badge">DEMO MODE</span>';
            }

            if (data.dashboard_title) {
                document.title = data.dashboard_title;
                document.querySelector('.logo').textContent = data.dashboard_title;
            }

            updateDisplay();
        }

        function fetchData() {
            fetch('/api/aircraft')
                .then(res => res.json())
                .then(data => updateDashboard(data))
                .catch(err => {
                    console.error('Fetch error:', err);
                    updateDashboard({ error: 'Connection failed' });
                });
        }

        // Threshold slider
        const slider = document.getElementById('threshold-slider');
        const thresholdDisplay = document.getElementById('threshold-display');

        slider.addEventListener('input', () => {
            thresholdDisplay.textContent = slider.value;
        });

        slider.addEventListener('change', () => {
            fetch('/api/settings/seen-threshold', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({value: parseInt(slider.value)})
            });
        });

        // Sync slider with server value on load
        fetch('/api/settings/seen-threshold')
            .then(r => r.json())
            .then(d => {
                slider.value = d.seen_threshold;
                thresholdDisplay.textContent = d.seen_threshold;
            });

        // Initial fetch
        fetchData();

        // Refresh every 2 seconds
        setInterval(fetchData, 2000);
    </script>
</body>
</html>
